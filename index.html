<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest</title>
<link rel="stylesheet" href="style.css">
</head>
    <body>
        <div id="floatingObjects"></div>
        <div class="container">
            <h1 class="title">🌍GeoQuest</h1>
            <p class="subtitle">Explore the world through geography!</p>

            <div id="menu" class="card">

                <h3>Players / Teams</h3>
                <input id="playerName" placeholder="Player name">
                <button id="addPlayer" onclick="addPlayer()">+ Add Player</button>
                <ul id="playerList" class="hidden"></ul>

                <h3>Select Categories</h3>

                <div class="categories">
                    <button class="category active">Countries</button>
                    <button class="category">Capitals</button>
                    <button class="category">Oceans</button>
                    <button class="category">Mountains</button>
                    <button class="category">Continents</button>
                </div>

                <h3>Difficulty Level</h3>

                <div class="difficulty">
                    <button onclick="setDifficulty('easy')" class="active">Easy</button>
                    <button onclick="setDifficulty('medium')">Medium</button>
                    <button onclick="setDifficulty('hard')">Hard</button>
                </div>

                <h3>Number of Rounds</h3>

                <div class="rounds">
                    <button onclick="setRounds(5)" class="active">5</button>
                    <button onclick="setRounds(10)">10</button>
                    <button onclick="setRounds(15)">15</button>
                    <button onclick="setRounds(20)">20</button>
                </div>

            <button class="startBtn" onclick="startGame()">Start Game</button>

            </div>

            <div id="game" class="card hidden">
                <h2 id="question"></h2>
                <div id="answers"></div>
                <div id="feedback"></div>
                <div id="nextBtn" class="hidden">
                    <button onclick="proceed()">Next</button>
                </div>
                <div id="scores"></div>
            </div>
            <div id="result" class="card hidden">
                <h2>Game Over</h2>
                <p><span id="finalScore"></span></p>
                <button onclick="restartGame()">Play Again</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
